<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juiceme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #heart {
      position: relative;
      z-index: 1;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <canvas id="heart"></canvas>
  <script>
    // ── Glitter background ──────────────────────────────────────────
    const bg = document.getElementById('bg');
    const bgCtx = bg.getContext('2d');
    let BW = bg.width  = window.innerWidth;
    let BH = bg.height = window.innerHeight;

    const mouse = { x: BW / 2, y: BH / 2 };
    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    document.addEventListener('touchmove', e => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('resize', () => {
      BW = bg.width  = window.innerWidth;
      BH = bg.height = window.innerHeight;
      initGlitters();
    });

    const NUM_GLITTERS = 500;
    const glitters = [];

    function randomGlitter(forceEdge) {
      return {
        x: Math.random() * BW,
        y: Math.random() * BH,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        size: Math.random() * 2.6 + 0.5,
        alpha: Math.random(),
        twinkleSpeed: Math.random() * 0.04 + 0.01,
        phase: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.6
          ? Math.random() * 50 + 310   // pinks/reds
          : Math.random() < 0.5
            ? Math.random() * 40 + 180  // blues
            : Math.random() * 30 + 50,  // gold/yellow
        // cursor trail properties
        trailX: 0,
        trailY: 0,
        trailActive: false,
        trailAlpha: 0,
      };
    }

    function initGlitters() {
      glitters.length = 0;
      for (let i = 0; i < NUM_GLITTERS; i++) glitters.push(randomGlitter());
    }
    initGlitters();

    // Cursor trail particles — burst from cursor
    const TRAIL_PARTICLES = [];
    const MAX_TRAIL = 120;

    function spawnTrail(x, y) {
      if (TRAIL_PARTICLES.length >= MAX_TRAIL) return;
      const count = 3;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2.5 + 0.5;
        TRAIL_PARTICLES.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          size: Math.random() * 2.5 + 0.8,
          hue: Math.random() < 0.5 ? Math.random() * 50 + 310 : Math.random() * 40 + 40,
          life: 1,
          decay: Math.random() * 0.03 + 0.02,
        });
      }
    }

    let lastMX = mouse.x, lastMY = mouse.y;
    document.addEventListener('mousemove', e => {
      spawnTrail(e.clientX, e.clientY);
    });
    document.addEventListener('touchmove', e => {
      spawnTrail(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    const INFLUENCE = 200;

    function drawStar(ctx, x, y, size, hue, alpha, proximity) {
      ctx.save();
      ctx.translate(x, y);
      ctx.globalAlpha = alpha;
      const s = size * (1 + proximity * 1.8);
      ctx.fillStyle = `hsl(${hue}, 100%, ${65 + proximity * 35}%)`;

      // 4-point star
      ctx.beginPath();
      for (let p = 0; p < 4; p++) {
        const angle = (p / 4) * Math.PI * 2;
        const innerAngle = angle + Math.PI / 4;
        const ox = Math.cos(angle) * s;
        const oy = Math.sin(angle) * s;
        const ix = Math.cos(innerAngle) * s * 0.2;
        const iy = Math.sin(innerAngle) * s * 0.2;
        p === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
        ctx.lineTo(ix, iy);
      }
      ctx.closePath();
      ctx.fill();

      // bright core
      ctx.globalAlpha = alpha * 0.95;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawGlitters(timestamp) {
      bgCtx.clearRect(0, 0, BW, BH);

      // big soft cursor glow
      const grd = bgCtx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, INFLUENCE);
      grd.addColorStop(0,   'rgba(255,80,160,0.18)');
      grd.addColorStop(0.4, 'rgba(200,40,120,0.08)');
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      bgCtx.fillStyle = grd;
      bgCtx.fillRect(0, 0, BW, BH);

      const t = timestamp * 0.001;

      // Draw & move ambient glitters
      for (const g of glitters) {
        // drift
        g.x += g.vx;
        g.y += g.vy;

        // wrap around edges
        if (g.x < -10) g.x = BW + 10;
        if (g.x > BW + 10) g.x = -10;
        if (g.y < -10) g.y = BH + 10;
        if (g.y > BH + 10) g.y = -10;

        // cursor attraction — glitters near cursor gently pull toward it
        const dx = mouse.x - g.x;
        const dy = mouse.y - g.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const proximity = Math.max(0, 1 - dist / INFLUENCE);

        if (proximity > 0) {
          g.vx += dx * 0.0003;
          g.vy += dy * 0.0003;
          // dampen so they don't fly away
          g.vx *= 0.97;
          g.vy *= 0.97;
        } else {
          // natural slow drift
          g.vx *= 0.995;
          g.vy *= 0.995;
          // tiny random nudge to keep them alive
          g.vx += (Math.random() - 0.5) * 0.04;
          g.vy += (Math.random() - 0.5) * 0.04;
        }

        const twinkle = 0.5 + 0.5 * Math.sin(t * g.twinkleSpeed * 60 + g.phase);
        const a = twinkle * (0.2 + proximity * 0.8);

        drawStar(bgCtx, g.x, g.y, g.size, g.hue, a, proximity);
      }

      // Draw cursor trail particles
      for (let i = TRAIL_PARTICLES.length - 1; i >= 0; i--) {
        const p = TRAIL_PARTICLES[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.93;
        p.vy *= 0.93;
        p.life -= p.decay;
        p.alpha = p.life;

        if (p.life <= 0) {
          TRAIL_PARTICLES.splice(i, 1);
          continue;
        }

        bgCtx.save();
        bgCtx.translate(p.x, p.y);
        bgCtx.globalAlpha = p.alpha * 0.9;

        const s = p.size * p.life;
        bgCtx.fillStyle = `hsl(${p.hue}, 100%, 80%)`;

        // sparkle cross
        bgCtx.beginPath();
        for (let k = 0; k < 4; k++) {
          const a2 = (k / 4) * Math.PI * 2;
          const ia = a2 + Math.PI / 4;
          k === 0 ? bgCtx.moveTo(Math.cos(a2)*s, Math.sin(a2)*s) : bgCtx.lineTo(Math.cos(a2)*s, Math.sin(a2)*s);
          bgCtx.lineTo(Math.cos(ia)*s*0.2, Math.sin(ia)*s*0.2);
        }
        bgCtx.closePath();
        bgCtx.fill();

        bgCtx.globalAlpha = p.alpha;
        bgCtx.fillStyle = '#fff';
        bgCtx.beginPath();
        bgCtx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
        bgCtx.fill();

        bgCtx.restore();
      }

      requestAnimationFrame(drawGlitters);
    }
    requestAnimationFrame(drawGlitters);

    // ── Heart canvas ────────────────────────────────────────────────
    const canvas = document.getElementById('heart');
    const ctx = canvas.getContext('2d');
    const W = 600;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    const WORD = 'Ohh Rasuuu ';
    const FONT_SIZE = 13;
    const NUM_RINGS = 6;

    function getHeartPoints(scaleFactor, numPoints) {
      const pts = [];
      const base = 13 * scaleFactor;
      const cx = W / 2;
      const cy = H / 2 + 20;
      for (let i = 0; i <= numPoints; i++) {
        const t = (i / numPoints) * Math.PI * 2;
        const x = cx + base * 16 * Math.pow(Math.sin(t), 3);
        const y = cy - base * (
          13 * Math.cos(t)
          - 5 * Math.cos(2 * t)
          - 2 * Math.cos(3 * t)
          - Math.cos(4 * t)
        );
        pts.push({ x, y });
      }
      return pts;
    }

    function pathLength(pts) {
      let len = 0;
      for (let i = 1; i < pts.length; i++) {
        const dx = pts[i].x - pts[i - 1].x;
        const dy = pts[i].y - pts[i - 1].y;
        len += Math.sqrt(dx * dx + dy * dy);
      }
      return len;
    }

    const rings = [];
    for (let r = 0; r < NUM_RINGS; r++) {
      const scale = 0.58 + r * 0.10;
      const pts = getHeartPoints(scale, 1200);
      const len = pathLength(pts);
      rings.push({ pts, len, scale });
    }

    function ringColor(r) {
      const t = r / (NUM_RINGS - 1);
      return `rgb(${Math.round(160+t*80)},${Math.round(30+t*50)},${Math.round(80+t*100)})`;
    }
    function ringOutlineColor(r) {
      const t = r / (NUM_RINGS - 1);
      return `rgb(${Math.round(220+t*35)},${Math.round(80+t*80)},${Math.round(130+t*100)})`;
    }

    let time = 0;
    function drawHeart() {
      ctx.clearRect(0, 0, W, H);
      ctx.font = `bold ${FONT_SIZE}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for (let r = 0; r < NUM_RINGS; r++) {
        const { pts, len } = rings[r];
        const charW = FONT_SIZE * 0.62;
        const numChars = Math.floor(len / charW);
        const speed = 0.35 + r * 0.04;
        const offset = (time * speed) % len;

        ctx.fillStyle = ringColor(r);
        ctx.strokeStyle = ringOutlineColor(r);
        ctx.lineWidth = 0.15;
        ctx.globalAlpha = 0.75 + (r / NUM_RINGS) * 0.25;

        for (let i = 0; i < numChars; i++) {
          const targetLen = ((i * charW) + offset) % len;
          let cum = 0;
          for (let s = 1; s < pts.length; s++) {
            const dx = pts[s].x - pts[s - 1].x;
            const dy = pts[s].y - pts[s - 1].y;
            const segLen = Math.sqrt(dx * dx + dy * dy);
            if (cum + segLen >= targetLen) {
              const frac = (targetLen - cum) / segLen;
              const x = pts[s - 1].x + frac * dx;
              const y = pts[s - 1].y + frac * dy;
              const angle = Math.atan2(dy, dx);
              const ch = WORD[(i + r * 4) % WORD.length];
              if (ch !== ' ') {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.fillText(ch, 0, 0);
                ctx.strokeText(ch, 0, 0);
                ctx.restore();
              }
              break;
            }
            cum += segLen;
          }
        }
      }

      ctx.globalAlpha = 1;
      time += 1;
      requestAnimationFrame(drawHeart);
    }
    drawHeart();
  </script>
</body>
</html>
